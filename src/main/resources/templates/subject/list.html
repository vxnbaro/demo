<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Môn học | EduGrade</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar('subjects')}"></div>

<div id="main">
    <div class="topbar">
        <div class="topbar-title"><i class="bi bi-book me-2"></i>Quản lý Môn học</div>
        <span class="text-muted" style="font-size:.8rem"
              th:text="${#temporals.format(#temporals.createNow(),'dd/MM/yyyy')}"></span>
    </div>
    <div class="content">
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-end mb-3">
            <a th:href="@{/subjects/new}" class="btn btn-primary"
               sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-plus-lg me-1"></i>Thêm môn học
            </a>
        </div>

        <div class="card table-card">
            <div class="card-header">
                <i class="bi bi-book me-2"></i>Danh sách môn học
                <span class="badge bg-primary ms-2" th:text="${#lists.size(subjects)}">0</span>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="px-3">#</th>
                        <th>Mã môn</th>
                        <th>Tên môn học</th>
                        <th class="text-center">Số tín chỉ</th>
                        <th>Mô tả</th>
                        <th class="text-center" sec:authorize="hasRole('ADMIN')">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="sub, iter : ${subjects}">
                        <td class="px-3 text-muted" th:text="${iter.index + 1}">1</td>
                        <td>
                            <span class="badge bg-primary fw-600"
                                  th:text="${sub.subjectCode}">MH001</span>
                        </td>
                        <td class="fw-600" th:text="${sub.subjectName}">Tên môn</td>
                        <td class="text-center">
                            <span class="badge bg-light text-dark border"
                                  th:text="${sub.credits} + ' TC'">3 TC</span>
                        </td>
                        <td class="text-muted" style="font-size:.85rem"
                            th:text="${sub.description ?: '-'}">-</td>
                        <td class="text-center" sec:authorize="hasRole('ADMIN')">
                            <div class="d-flex gap-1 justify-content-center">
                                <a th:href="@{/subjects/{id}/edit(id=${sub.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/subjects/{id}/delete(id=${sub.id})}"
                                      method="post"
                                      onsubmit="return confirm('Xóa môn học này?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(subjects)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="bi bi-book fs-2 d-block mb-2"></i>Chưa có môn học nào
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chi tiết Sinh viên | EduGrade</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar('students')}"></div>

<div id="main">
    <div class="topbar">
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/students}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div class="topbar-title">Chi tiết Sinh viên</div>
        </div>
        <span class="text-muted" style="font-size:.8rem"
              th:text="${#temporals.format(#temporals.createNow(),'dd/MM/yyyy')}"></span>
    </div>

    <div class="content">
        <div class="row g-3">
            <!-- Thông tin cá nhân -->
            <div class="col-lg-4">
                <div class="card h-100">
                    <div class="card-body text-center pt-4">
                        <div class="avatar-circle mx-auto mb-3"
                             style="width:80px;height:80px;border-radius:50%;
                                    background:linear-gradient(135deg,#1a56db,#7c3aed);
                                    display:flex;align-items:center;justify-content:center;
                                    font-size:2rem;color:#fff;font-weight:700;">
                            <span th:text="${#strings.substring(student.fullName, 0, 1)}">A</span>
                        </div>
                        <h5 class="fw-700 mb-1" th:text="${student.fullName}">Tên SV</h5>
                        <span class="badge bg-primary mb-3" th:text="${student.studentCode}">SV001</span>

                        <!-- GPA block -->
                        <div class="p-3 rounded-3 mb-3" style="background:#f8fafc;">
                            <div class="row g-2">
                                <div class="col-4">
                                    <div class="fw-700 fs-5 text-primary"
                                         th:text="${#numbers.formatDecimal(gpa, 1, 2)}">0.00</div>
                                    <div class="text-muted" style="font-size:.7rem">GPA</div>
                                </div>
                                <div class="col-4">
                                    <div class="fw-700 fs-5 text-success" th:text="${passed}">0</div>
                                    <div class="text-muted" style="font-size:.7rem">Đạt</div>
                                </div>
                                <div class="col-4">
                                    <div class="fw-700 fs-5 text-danger" th:text="${failed}">0</div>
                                    <div class="text-muted" style="font-size:.7rem">Rớt</div>
                                </div>
                            </div>
                        </div>

                        <span th:text="${student.academicRank}"
                              th:classappend="${gpa >= 8.0} ? 'badge bg-success fs-6' :
                                              (${gpa >= 6.5} ? 'badge bg-primary fs-6' :
                                              (${gpa >= 5.0} ? 'badge bg-warning text-dark fs-6' :
                                              'badge bg-danger fs-6'))">Xếp loại</span>
                    </div>
                    <div class="card-footer bg-white">
                        <div class="row g-2 text-start">
                            <div class="col-12 py-1 border-bottom">
                                <small class="text-muted d-block">Lớp</small>
                                <span th:text="${student.schoolClass != null ? student.schoolClass.className : 'Chưa phân lớp'}"
                                      class="fw-600">-</span>
                            </div>
                            <div class="col-12 py-1 border-bottom">
                                <small class="text-muted d-block">Email</small>
                                <span th:text="${student.email}" class="fw-600">-</span>
                            </div>
                            <div class="col-6 py-1">
                                <small class="text-muted d-block">Giới tính</small>
                                <span th:text="${student.gender ?: '-'}" class="fw-600">-</span>
                            </div>
                            <div class="col-6 py-1">
                                <small class="text-muted d-block">SĐT</small>
                                <span th:text="${student.phoneNumber ?: '-'}" class="fw-600">-</span>
                            </div>
                            <div class="col-12 py-1" th:if="${student.dateOfBirth != null}">
                                <small class="text-muted d-block">Ngày sinh</small>
                                <span th:text="${#temporals.format(student.dateOfBirth,'dd/MM/yyyy')}"
                                      class="fw-600">-</span>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-3">
                            <a th:href="@{/students/{id}/edit(id=${student.id})}"
                               class="btn btn-primary btn-sm flex-fill">
                                <i class="bi bi-pencil me-1"></i>Sửa
                            </a>
                            <a th:href="@{/grades/new(studentId=${student.id})}"
                               class="btn btn-outline-success btn-sm flex-fill">
                                <i class="bi bi-plus me-1"></i>Nhập điểm
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bảng điểm -->
            <div class="col-lg-8">
                <div class="card table-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-journal-check me-2"></i>Bảng điểm</span>
                        <!-- Lọc học kỳ -->
                        <div class="d-flex gap-2 align-items-center">
                            <small class="text-muted">Học kỳ:</small>
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/students/{id}(id=${student.id})}"
                                   class="btn btn-outline-secondary"
                                   th:classappend="${selectedSemester == null} ? ' active' : ''">Tất cả</a>
                                <th:block th:each="sem : ${semesters}">
                                    <a th:href="@{/students/{id}(id=${student.id}, semester=${sem})}"
                                       th:text="${sem}"
                                       class="btn btn-outline-secondary"
                                       th:classappend="${sem == selectedSemester} ? ' active' : ''">HK</a>
                                </th:block>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th class="px-3">Môn học</th>
                                <th class="text-center">TC</th>
                                <th class="text-center">CC</th>
                                <th class="text-center">GK</th>
                                <th class="text-center">CK</th>
                                <th class="text-center">Tổng kết</th>
                                <th class="text-center">Chữ</th>
                                <th class="text-center">Kết quả</th>
                                <th class="text-center">Học kỳ</th>
                                <th class="text-center">Sửa</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="g : ${grades}">
                                <td class="px-3 fw-600" th:text="${g.subject.subjectName}">Môn</td>
                                <td class="text-center text-muted" th:text="${g.subject.credits}">3</td>
                                <td class="text-center" th:text="${g.attendanceScore != null ? #numbers.formatDecimal(g.attendanceScore,1,1) : '-'}">-</td>
                                <td class="text-center" th:text="${g.midtermScore != null ? #numbers.formatDecimal(g.midtermScore,1,1) : '-'}">-</td>
                                <td class="text-center" th:text="${g.finalScore != null ? #numbers.formatDecimal(g.finalScore,1,1) : '-'}">-</td>
                                <td class="text-center">
                                    <span class="fw-700"
                                          th:text="${#numbers.formatDecimal(g.score,1,1)}"
                                          th:style="${g.score >= 8.0} ? 'color:#15803d' :
                                                     (${g.score >= 6.5} ? 'color:#1d4ed8' :
                                                     (${g.score >= 5.0} ? 'color:#a16207' : 'color:#dc2626'))">0.0</span>
                                </td>
                                <td class="text-center">
                                    <span th:text="${g.letterGrade}"
                                          th:classappend="${g.letterGrade.startsWith('A')} ? 'grade-badge grade-a' :
                                                          (${g.letterGrade.startsWith('B')} ? 'grade-badge grade-b' :
                                                          (${g.letterGrade.startsWith('C')} ? 'grade-badge grade-c' :
                                                          (${g.letterGrade.startsWith('D')} ? 'grade-badge grade-d' :
                                                          'grade-badge grade-f')))">A</span>
                                </td>
                                <td class="text-center">
                                    <span th:if="${g.passed}" class="badge bg-success">Đạt</span>
                                    <span th:unless="${g.passed}" class="badge bg-danger">Rớt</span>
                                </td>
                                <td class="text-center">
                                    <span class="badge bg-light text-dark border"
                                          th:text="${g.semester}">HK</span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/grades/{id}/edit(id=${g.id})}"
                                       class="btn btn-xs btn-outline-primary" style="font-size:.75rem;padding:.2rem .5rem">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(grades)}">
                                <td colspan="10" class="text-center text-muted py-4">
                                    <i class="bi bi-journal-x fs-2 d-block mb-2"></i>
                                    Chưa có điểm nào
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
